<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Manager</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

        <h1 class="text-3xl font-bold text-center mb-6">
            CSV Manager
        </h1>

        <div class="flex gap-2 mb-6">
            <button id="loginTab" class="w-full bg-blue-500 text-white py-2 rounded-lg">
                Login
            </button>

            <button id="registerTab" class="w-full bg-gray-200 py-2 rounded-lg">
                Cadastro
            </button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" class="space-y-4">

            <input type="email" id="loginEmail" placeholder="Email" class="w-full border p-3 rounded-lg">

            <input type="password" id="loginPassword" placeholder="Senha" class="w-full border p-3 rounded-lg">

            <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600">
                Entrar
            </button>

        </form>

        <!-- CADASTRO -->
        <form id="registerForm" class="space-y-4 hidden">

            <input type="text" id="registerName" placeholder="Seu nome" class="w-full border p-3 rounded-lg">

            <input type="email" id="registerEmail" placeholder="Email" class="w-full border p-3 rounded-lg">

            <input type="password" id="registerPassword" placeholder="Senha" class="w-full border p-3 rounded-lg">

            <button type="submit" class="w-full bg-green-500 text-white py-3 rounded-lg hover:bg-green-600">
                Criar conta
            </button>

        </form>

    </div>

    <script type="module" src="./js/firebase/auth.js"></script>

</body>

</html>
