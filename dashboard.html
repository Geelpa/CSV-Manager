<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow p-4 flex justify-between items-center">

        <h1 class="text-2xl font-bold">
            Csv Manager
        </h1>

        <div class="flex items-center gap-4">

            <span id="welcomeText">
                Carregando...
            </span>

            <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg">
                Sair
            </button>

        </div>

    </header>

    <!-- MAIN -->
    <main class="p-6">

        <!-- UPLOAD -->
        <div class="bg-white p-6 rounded-2xl shadow">

            <div class="flex gap-4">

                <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="border p-3 rounded-lg w-full">

                <button id="uploadBtn" class="bg-blue-500 text-white px-6 py-3 rounded-lg">
                    Importar
                </button>

            </div>

        </div>
        <div class="mt-6">

            <h2 class="text-xl font-bold mb-3">
                Planilhas
            </h2>

            <div id="sheetsContainer" class="space-y-2"></div>

        </div>

        <!-- ABAS -->
        <div class="flex gap-2 mt-6">

            <button id="pendingTab" class="bg-blue-500 text-white px-4 py-2 rounded-lg">
                Pendentes
            </button>

            <button id="calledTab" class="bg-green-500 text-white px-4 py-2 rounded-lg">
                Chamados
            </button>

            <button id="deletedTab" class="bg-red-500 text-white px-4 py-2 rounded-lg">
                Excluídos
            </button>

        </div>

        <!-- CONTATOS -->
        <div id="contactsContainer" class="mt-6 space-y-3"></div>

    </main>

    <script type="module" src="./js/dashboard.js"></script>

</body>

</html>
