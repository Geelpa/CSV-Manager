<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style src="./css/style.css"></style>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow p-4 flex justify-between items-center">

        <h1 class="text-2xl font-bold">
            Csv Manager
        </h1>

        <div class="flex items-center gap-4">

            <span id="welcomeText">
                Carregando...
            </span>

            <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg">
                Sair
            </button>

        </div>

    </header>

    <!-- MAIN -->
    <main class="p-6">

        <!-- UPLOAD -->
        <div class="bg-white p-6 rounded-2xl shadow">

            <div class="flex gap-4">

                <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="border p-3 rounded-lg w-full">

                <button id="uploadBtn" class="bg-blue-500 text-white px-6 py-3 rounded-lg">
                    Importar
                </button>

            </div>

        </div>
        <div class="mt-6">

            <h2 class="text-xl font-bold mb-3">
                Planilhas
            </h2>

            <div id="sheetsContainer" class="space-y-2"></div>

        </div>
        <div id="sheetInfo" class="mt-6 mb-4">

            <div id="emptyState"
                class="bg-gray-100 border border-dashed border-gray-300 rounded-2xl p-8 text-center text-gray-500">
                Nenhuma planilha selecionada.
            </div>

            <div id="activeSheet" class="hidden bg-white shadow rounded-2xl p-4">

                <span class="text-sm text-gray-400">
                    Planilha atual
                </span>

                <h2 id="activeSheetName" class="text-2xl font-bold">
                    -
                </h2>

            </div>

        </div>

        <!-- ABAS -->
        <div class="grid grid-cols-3 gap-3 mt-6">

            <button id="pendingTab" class="tabBtn activeTab">
                <span class="text-sm opacity-70">
                    Pendentes
                </span>

                <strong id="pendingCount" class="text-2xl">
                    0
                </strong>
            </button>


            <button id="calledTab" class="tabBtn">
                <span class="text-sm opacity-70">
                    Chamados
                </span>

                <strong id="calledCount" class="text-2xl">
                    0
                </strong>
            </button>


            <button id="deletedTab" class="tabBtn">
                <span class="text-sm opacity-70">
                    Excluídos
                </span>

                <strong id="deletedCount" class="text-2xl">
                    0
                </strong>
            </button>

        </div>

        <!-- CONTATOS -->
        <div id="contactsContainer" class="mt-6 space-y-3"></div>

    </main>

    <script type="module" src="./js/dashboard.js"></script>

</body>

</html>
